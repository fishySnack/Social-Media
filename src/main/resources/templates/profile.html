<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="/profile.css">
</head>
<body>

<div class="profile-container single-col">

    <h1>My Profile</h1>

    <p th:if="${error}" th:text="${error}" class="error-msg"></p>

    <form id="profileForm" action="/profile" method="POST" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="profile-card edit-card">

            <div class="profile-picture">
                <img id="profilePreview"
                     th:src="${imageData != null} ? ${imageData} : @{/images/defaultProfile.png}"
                     src="/images/defaultProfile.png"
                     alt="Profile Picture">
                <button type="button" onclick="document.getElementById('imageInput').click()">Change Photo</button>
                <input type="file" name="image" accept="image/*" id="imageInput" style="display:none">
            </div>

            <div class="profile-info">
                <label>Name</label>
                <input type="text" name="name" placeholder="Your name" th:value="${name}" required>

                <label>Username</label>
                <input type="text" name="username" placeholder="Username" th:value="${username}" required>

                <label>Bio</label>
                <textarea name="bio" placeholder="Write a short bio..." th:text="${bio}"></textarea>

                <button type="submit">Save Profile</button>
            </div>

        </div>
    </form>

</div>

<script>
const imageInput = document.getElementById('imageInput');
const profilePreview = document.getElementById('profilePreview');

imageInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            profilePreview.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
