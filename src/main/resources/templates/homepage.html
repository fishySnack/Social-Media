<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="/profile.css">
</head>
<body>

<div class="profile-container">
    <h1>Welcome to Your Homepage</h1>

    <div class="profile-card">

        <div class="profile-picture">
            <img th:src="${user.imageData != null} ? ${user.imageData} : '/images/defaultProfile.png'"
                 alt="Profile Picture">
        </div>

        <div class="profile-info">
            <p>
                <strong>Name:</strong>
                <span th:text="${user.name != null} ? ${user.name} : 'N/A'"></span>
            </p>

            <p>
                <strong>Username:</strong>
                <span th:text="${user.username != null} ? ${user.username} : 'N/A'"></span>
            </p>

            <p>
                <strong>Bio:</strong>
                <span th:text="${user.bio != null} ? ${user.bio} : 'No bio yet.'"></span>
            </p>
        </div>

    </div>

</div>

</body>
</html>
